# =============================================================================
# pipeline-armor :: reusable-secret-scan.yml
# -----------------------------------------------------------------------------
# Detects committed secrets (API keys, tokens, private keys, etc.) by running
# Gitleaks and Trufflehog over the repository.
#
# Two scanners are used because they have complementary strengths:
#   - Gitleaks  : fast regex-based scan of git history. Good for historic
#                 leaks and for caller-provided custom rule sets.
#   - Trufflehog: verifies findings by attempting an authenticated request
#                 against the corresponding provider, which dramatically
#                 reduces false positives.
#
# Findings from both scanners are deduplicated by (file, line, redacted hash)
# and reported without ever printing the secret material itself.
# =============================================================================
name: reusable-secret-scan

on:
  workflow_call:
    inputs:
      scan_depth:
        description: 'Scope of the scan: staged|all|diff'
        type: string
        default: 'all'
      fail_on_detection:
        description: 'Fail the job when verified secrets are detected.'
        type: boolean
        default: true
      baseline_file:
        description: 'Path to a Gitleaks baseline file of accepted findings.'
        type: string
        default: '.gitleaks.baseline.json'
      base_ref:
        description: 'Base ref for diff scans (only used when scan_depth=diff).'
        type: string
        default: ''

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # -----------------------------------------------------------------------
      # fetch-depth: 0 is mandatory — both scanners walk git history. Shallow
      # clones miss credentials that were deleted from HEAD but remain in old
      # commits, which is the most common real-world leak pattern.
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 1. Gitleaks. Pinned to a major version via the official action; we
      #    pass --no-banner for clean logs and route findings to a JSON file
      #    rather than relying on the action's exit code.
      # -----------------------------------------------------------------------
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          curl -sSLo /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        env:
          BASELINE: ${{ inputs.baseline_file }}
          DEPTH: ${{ inputs.scan_depth }}
          BASE_REF: ${{ inputs.base_ref || github.base_ref }}
        run: |
          set +e
          common_args=(--no-banner --redact --report-format json --report-path gitleaks-report.json)
          if [ -f "$BASELINE" ]; then
            common_args+=(--baseline-path "$BASELINE")
          fi
          case "$DEPTH" in
            staged)
              gitleaks protect --staged "${common_args[@]}"
              ;;
            diff)
              if [ -n "$BASE_REF" ]; then
                gitleaks detect --source . --log-opts="origin/$BASE_REF..HEAD" "${common_args[@]}"
              else
                gitleaks detect --source . "${common_args[@]}"
              fi
              ;;
            *)
              gitleaks detect --source . "${common_args[@]}"
              ;;
          esac
          echo "GITLEAKS_EXIT=$?" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 2. Trufflehog. We use `--only-verified` so we only report secrets
      #    where the credential was confirmed live by the upstream provider.
      #    This is the difference between "we found something that looks like
      #    an AWS key" and "we found a working AWS key" — the latter being
      #    the only kind we want to page a human about.
      # -----------------------------------------------------------------------
      - name: Install Trufflehog
        env:
          TRUFFLEHOG_VERSION: '3.83.7'
        run: |
          curl -sSLo /tmp/th.tar.gz \
            "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/th.tar.gz -C /tmp trufflehog
          sudo mv /tmp/trufflehog /usr/local/bin/trufflehog
          trufflehog --version

      - name: Run Trufflehog
        run: |
          set +e
          trufflehog filesystem . \
            --json \
            --only-verified \
            --no-update \
            > trufflehog-report.json
          echo "TRUFFLEHOG_EXIT=$?" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 3. Combine, deduplicate, and render reports. Per policy, we NEVER
      #    print the secret value — only the rule that fired, file:line, and
      #    a one-line redacted preview.
      # -----------------------------------------------------------------------
      - name: Combine findings
        id: combine
        run: |
          python3 - <<'PY'
          import json, os, pathlib, hashlib

          def load(p):
              f = pathlib.Path(p)
              if not f.exists() or f.stat().st_size == 0:
                  return []
              try:
                  txt = f.read_text().strip()
                  if txt.startswith('['):
                      return json.loads(txt)
                  return [json.loads(line) for line in txt.splitlines() if line.strip()]
              except json.JSONDecodeError:
                  return []

          gl = load("gitleaks-report.json")
          th = load("trufflehog-report.json")
          findings = []

          for f in gl:
              findings.append({
                  "source": "gitleaks",
                  "rule": f.get("RuleID", "unknown"),
                  "file": f.get("File", "?"),
                  "line": f.get("StartLine", 0),
                  "secret_type": f.get("Description", "secret"),
                  "verified": False,
              })

          for f in th:
              src = (f.get("SourceMetadata", {}) or {}).get("Data", {}) or {}
              fs = src.get("Filesystem", {}) or {}
              findings.append({
                  "source": "trufflehog",
                  "rule": f.get("DetectorName", "unknown"),
                  "file": fs.get("file", "?"),
                  "line": fs.get("line", 0),
                  "secret_type": f.get("DetectorName", "secret"),
                  "verified": bool(f.get("Verified", False)),
              })

          # Dedupe by (file, line, rule).
          seen = set()
          deduped = []
          for f in findings:
              key = (f["file"], f["line"], f["rule"])
              if key in seen:
                  continue
              seen.add(key)
              deduped.append(f)

          verified = [f for f in deduped if f["verified"]]
          unverified = [f for f in deduped if not f["verified"]]

          pathlib.Path("secrets-summary.json").write_text(json.dumps({
              "total": len(deduped),
              "verified": len(verified),
              "unverified": len(unverified),
              "findings": deduped,
          }, indent=2))

          # Build the markdown summary.
          lines = ["## Secret Scan Results", ""]
          lines.append(f"- **Total findings:** {len(deduped)}")
          lines.append(f"- **Verified (live):** {len(verified)}")
          lines.append(f"- **Unverified:** {len(unverified)}")
          lines.append("")
          if deduped:
              lines.append("| Scanner | Rule | Type | File | Line | Verified |")
              lines.append("|---|---|---|---|---|---|")
              for f in deduped[:50]:
                  v = "yes" if f["verified"] else "no"
                  lines.append(
                      f"| {f['source']} | `{f['rule']}` | {f['secret_type']} | "
                      f"`{f['file']}` | {f['line']} | {v} |"
                  )
              lines.append("")
              lines.append(
                  "### Remediation\n"
                  "1. **Rotate the credential immediately** at the provider.\n"
                  "2. Remove the secret from history (`git filter-repo` or BFG).\n"
                  "3. Store the new value in GitHub Encrypted Secrets or your "
                  "organization's secrets manager (Vault, AWS Secrets Manager).\n"
                  "4. If this finding is a known false positive, add it to "
                  f"`{os.environ.get('BASELINE_FILE', '.gitleaks.baseline.json')}` "
                  "and reference it from the job inputs.\n"
              )
          else:
              lines.append("_No secrets detected._")

          pathlib.Path("secrets-summary.md").write_text("\n".join(lines))

          summary = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a") as fh:
              fh.write(pathlib.Path("secrets-summary.md").read_text())

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"verified={len(verified)}\n")
              out.write(f"unverified={len(unverified)}\n")
          PY
        env:
          BASELINE_FILE: ${{ inputs.baseline_file }}

      - name: Comment on PR
        if: github.event_name == 'pull_request' && hashFiles('secrets-summary.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('secrets-summary.md', 'utf8');
            const marker = '<!-- pipeline-armor:secrets -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            const fullBody = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: fullBody,
              });
            }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-reports
          path: |
            gitleaks-report.json
            trufflehog-report.json
            secrets-summary.json
            secrets-summary.md
          if-no-files-found: ignore
          retention-days: 30

      # -----------------------------------------------------------------------
      # 4. Gate. Only verified secrets fail the build by default — unverified
      #    findings are surfaced for review but treated as informational, on
      #    the theory that a hard fail on regex hits creates alert fatigue
      #    and trains engineers to skip the gate with `--no-verify`.
      # -----------------------------------------------------------------------
      - name: Enforce gate
        if: inputs.fail_on_detection
        env:
          VERIFIED: ${{ steps.combine.outputs.verified }}
        run: |
          if [ "${VERIFIED:-0}" -gt 0 ]; then
            echo "::error::Secret scan gate failed: $VERIFIED verified secret(s) detected."
            echo "See the job summary for remediation steps."
            exit 1
          fi
          echo "Secret scan gate passed."
